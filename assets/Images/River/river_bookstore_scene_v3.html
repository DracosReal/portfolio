    <desc>A subtle scene of a warm wooden bookstore with rain falling outside, three drifting silhouettes, Miso the cat, and an ambient green glow that breathes with River's emotional state.</desc>

        <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>

        <stop offset="0%" stop-color="#3a4a5a" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#1f2630" stop-opacity="0.7"/>
      </linearGradient>
      <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3a2616"/>
        <stop offset="100%" stop-color="#1a0f08"/>
      </linearGradient>
      <linearGradient id="shelfGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4a3220"/>
        <stop offset="100%" stop-color="#2a1d12"/>
      </linearGradient>
      <!-- Rain pattern: lines slant top-left to bottom-right (drops fall down with wind) -->
      <pattern id="raindrops" width="40" height="60" patternUnits="userSpaceOnUse">
        <line x1="6" y1="0" x2="10" y2="20" stroke="#7a8a98" stroke-width="0.6" opacity="0.5"/>
        <line x1="22" y1="10" x2="26" y2="30" stroke="#7a8a98" stroke-width="0.6" opacity="0.4"/>
        <line x1="32" y1="30" x2="36" y2="50" stroke="#7a8a98" stroke-width="0.6" opacity="0.5"/>
      </pattern>
      <clipPath id="windowClip">
        <rect x="370" y="120" width="80" height="80"/>
      </clipPath>
    </defs>

    <!-- Back wall warm wood -->
    <rect x="0" y="0" width="800" height="500" fill="#2a1d12"/>

    <!-- Ambient breathing glow (the "soul") -->
    <ellipse id="riverPulse" cx="400" cy="280" rx="500" ry="320" fill="url(#riverGlow)">

    </ellipse>

      <g clip-path="url(#windowClip)">
