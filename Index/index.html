  <style>
    /* ── Gradient text fallback for mobile ── */
    .gradient-text {
      color: #93c5fd;
      background: linear-gradient(to right, #93c5fd, #67e8f9);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @supports not (background-clip: text) or not (-webkit-background-clip: text) {
      .gradient-text {
        -webkit-text-fill-color: currentColor;
      }
    }

    .skip-link {
      position: absolute;
      top: -100px;
      left: 1rem;
      background: #93c5fd;
      color: #000;
      padding: 0.5rem 1rem;
      border-radius: 0 0 0.5rem 0.5rem;
      font-weight: 600;
      z-index: 9999;
      transition: top 0.2s;
      text-decoration: none;
    }

    .skip-link:focus {
      top: 0;
      outline: 3px solid #fff;
      outline-offset: 2px;
    }

    :focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 3px;
      border-radius: 4px;
    }

    .card-container {
      perspective: 1000px;
    }

    .card-flipper {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      touch-action: manipulation;
    }

    .card-container.flipped .card-flipper {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 0.5rem;
      -webkit-tap-highlight-color: transparent;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    @media (max-width: 768px) {
      .card-container {
        height: 22rem !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card-flipper {
        transition: none;
      }

      .animate-fadeIn {
        animation: none;
      }

      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out;
    }

    details summary {
      list-style: none;
    }

    details summary::-webkit-details-marker {
      display: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .cursor {
      animation: blink 1.06s step-start infinite;
      margin-left: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>

              title: 'Revision Reasoning Tool',
              summary: 'A self-directed tool design project building a judgment layer between AI document analysis and synthesis — structuring human authorship decisions rather than replacing them.',
              role: 'Systems Designer, Tool Architect',
              team: 'Self-directed; built collaboratively with AI',
              timeline: 'Ongoing development',
              tools: 'Claude, GPT-4, Python (AI-generated code)',
              problemLabel: 'The Problem I Noticed',
              approachLabel: 'The Design Decisions',
              findingsLabel: 'What It Does',
              problem: 'Most AI document tools operate as black boxes: feed in documents, get output. The human\'s judgment about which insights matter — and which don\'t — is either ignored or collapsed into a thumbs-up on the final result. Judgment happens too late, and leaves no record. For professional work, this creates a specific problem: it becomes impossible to prove what a human actually decided versus what the AI decided for them.',
              approach: 'The core architecture insight was recognizing that document comparison has four distinct phases that need to stay separated: Input, Interpretation, Decision, and Output. The tool inserts a structured judgment layer between Interpretation and Output — a step most tools skip entirely. Every AI-generated insight is surfaced explicitly, and the user must mark it accepted, rejected, or unsure (with a required note) before any merge can proceed. The merge engine is then constrained by those decisions — not free to act on its own. This was a design decision, not a technical one. The original AI implementation made a critical architectural mistake — direct client calls with regex parsing — that made the interpretation layer unpredictable. Replacing it with structured output contracts was the central intervention.',
              research: {
                title: 'The System in Action',
                content: 'The Revision Reasoning Tool surfaces AI-generated insights across multiple views — from an empty input state through structured analysis, conceptual diffs, and a judgment layer — so the user can evaluate, accept, reject, or flag each one before any merge proceeds.',
                images: [
                  { src: 'assets/Images/RRT/Documents.png', alt: 'Documents tab in empty state — the starting point before any content is loaded', caption: 'Documents tab — empty state before input' },
                  { src: 'assets/Images/RRT/Structured Analysis.png', alt: 'Structured Analysis view — AI-generated insights parsed into a readable two-column card grid with source badges', caption: 'Structured Analysis — insights parsed into a readable card grid' },
                  { src: 'assets/Images/RRT/Conceptual diff.png', alt: 'Conceptual Diff — three-column view showing what changed conceptually, what was removed, and what was emphasized more', caption: 'Conceptual Diff — what changed, what was removed, what was emphasized' },
                  { src: 'assets/Images/RRT/Judgement layer.png', alt: 'Judgment Layer — every AI-generated insight presented with Keep, Reject, and Unsure controls; merge is blocked until all are resolved', caption: 'Judgment Layer — every insight requires a decision before merge can proceed' }
                ]
              },
              findings: [
                'Users mark every AI insight as accept, reject, or unsure — the merge cannot run until all unsure items carry a note',
                'The merge output is constrained by those decisions; the AI cannot override accepted or rejected choices',
                'A structured audit trail documents which decisions were fully applied, partially applied, or not applied — with explanations',
                'Separates Input → Interpretation → Decision → Output as distinct phases, preventing AI judgment from bypassing human review',
                'Defensive UX blocks merge until all decisions are resolved — the error message explains why, making it pedagogical rather than just obstructive',

              design: {
                title: 'Architecture & Key Decisions',
                content: 'The clearest signal that this is design work, not just prompting: the original AI-generated code made a structural mistake I caught and named. It was making direct API calls and parsing responses with regex — which made behavior unpredictable and the outputs untrustworthy. I identified the missing layer, specified the structured output contract, and defined the schema. The AI then wrote the corrected implementation to my spec. The acceptance criteria I wrote before any code existed: "a user reviewing 50 insights should be able to prove, after the fact, exactly which ones they approved and why." That\'s the product.\n\nThe rebuild made that contract visual. Dark near-black background, warm cream type, gold accents — not a SaaS dashboard, a writer\'s instrument. Tab-based navigation (Input → Analysis → Diff → Decisions → Merge) makes the four phases legible as a progression rather than a scroll. Each tab appears as content is generated; the Decisions tab shows a live judgment counter. Merge is blocked until every unsure item carries a note — the error message explains why, making it pedagogical rather than just obstructive.\n\nHardening decisions that matter: scoped styles so the component doesn\'t bleed into the host page, structured JSON retry so model misbehavior doesn\'t silently corrupt output, request guards to prevent duplicate calls, token warnings before the context window fills. Export downloads a full session archive — decisions, notes, rationale, merged output — so the audit trail is portable.',

          <main id="main-content" className="max-w-7xl mx-auto px-4 sm:px-8 pt-8 pb-16 md:pt-16">
            <h2
              ref={mainHeadingRef}
              tabIndex={-1}
              className="text-3xl md:text-5xl font-light text-white text-center mb-8 md:mb-16 outline-none px-4"
            >
              Choose your path
            </h2>

            <ul
              className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
              aria-label="Discipline cards — press Enter or Space to flip a card and see projects"
            >
              {disciplines.map((discipline) => {
                const Art = discipline.artComponent;
                const isFlipped = flippedCards.includes(discipline.id);
                return (
                  <li key={discipline.id}>
                    <div
                      className={`card-container h-96 ${isFlipped ? 'flipped' : ''}`}
                      role="group"
                      aria-label={`${discipline.title} — ${discipline.subtitle}`}
                    >
                      <div className="card-flipper">
                        <button
                          className={`card-front border-2 ${discipline.borderColor} ${discipline.glassColor} backdrop-blur-md overflow-hidden w-full`}
                          onClick={() => handleCardToggle(discipline.id)}
                          aria-expanded={isFlipped}
                          aria-label={`${discipline.title}, ${discipline.subtitle}. Press to reveal projects.`}
                          tabIndex={isFlipped ? -1 : 0}
                        >
                          <div className="absolute inset-0 p-4 pointer-events-none">
                            <Art />
                          </div>
                          <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-black/10 flex flex-col justify-end p-6 pointer-events-none">
                            <span className="font-light mb-1 leading-tight text-white" style={{
                              textShadow: '0 2px 8px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.8), 1px 1px 0 rgba(0,0,0,1), -1px -1px 0 rgba(0,0,0,1)',
                              fontSize: 'clamp(1.4rem, 5.5vw, 3rem)',
                            }}>
                              {discipline.title}
                            </span>
                            <span className="text-sm tracking-widest font-medium" style={{
                              color: discipline.color.includes('blue') ? '#bfdbfe' :
                                discipline.color.includes('purple') ? '#e9d5ff' :
                                  discipline.color.includes('emerald') ? '#a7f3d0' :
                                    discipline.color.includes('amber') ? '#fde68a' :
                                      '#fecaca',
                              textShadow: '0 0 8px rgba(0,0,0,1), 0 0 16px rgba(0,0,0,1), 1px 1px 0 rgba(0,0,0,1), -1px -1px 0 rgba(0,0,0,1), 1px -1px 0 rgba(0,0,0,1), -1px 1px 0 rgba(0,0,0,1)'
                            }}>{discipline.subtitle}</span>
                          </div>
                        </button>

                        <div
                          className={`card-back border-2 ${discipline.borderColor} bg-black/90 backdrop-blur-md p-6 flex flex-col`}
                          aria-hidden={!isFlipped}
                        >
                          <div className="flex items-center justify-between mb-4">
                            <span className="text-xl md:text-2xl font-light" style={{
                              color: '#93c5fd',
                              background: `linear-gradient(to bottom right, ${discipline.color.includes('blue') ? '#60a5fa, #67e8f9' :
                                discipline.color.includes('purple') ? '#c084fc, #f9a8d4' :
                                  discipline.color.includes('emerald') ? '#34d399, #2dd4bf' :
                                    discipline.color.includes('amber') ? '#fbbf24, #fb923c' :
                                      '#f87171, #fb7185'})`,
                              WebkitBackgroundClip: 'text',
                              backgroundClip: 'text',
                              WebkitTextFillColor: 'transparent'
                            }}>
                              {discipline.title}
                            </span>
                            <button
                              onClick={() => handleCardToggle(discipline.id)}
                              aria-label={`Close ${discipline.title} card`}
                              tabIndex={isFlipped ? 0 : -1}
                              className="text-gray-500 hover:text-white text-xl px-2 transition-colors"
                            >
                              ✕
                            </button>
                          </div>
                          <ul className="flex-1 space-y-2 mb-4" aria-label={`${discipline.title} projects`}>
                            {discipline.projects.slice(0, 4).map((project) => (
                              <li key={project.id}>
                                <button
                                  onClick={(e) => goToProject(project, e)}
                                  tabIndex={isFlipped ? 0 : -1}
                                  className="w-full text-left text-sm text-gray-300 bg-white/5 border border-white/10 rounded p-3 hover:bg-white/15 hover:border-white/30 hover:text-white transition-all"
                                >
                                  {project.title}
                                </button>
                              </li>
                            ))}
                          </ul>
                          <button
                            onClick={(e) => goToDiscipline(discipline, e)}
                            tabIndex={isFlipped ? 0 : -1}
                            className={`w-full py-3 rounded bg-gradient-to-r ${discipline.color} text-black font-medium hover:opacity-90 transition-opacity`}
                            aria-label={`See all ${discipline.title} work — ${discipline.projects.length} projects`}
                          >
                            See all {discipline.title} work
                          </button>
                        </div>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>
          {/* ── TESTIMONIALS ── */}
          <section className="mt-20 mb-4" aria-labelledby="testimonials-heading">
            <h2 id="testimonials-heading" className="text-xs tracking-widest text-gray-500 uppercase mb-8 text-center">What people say</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {[
                {
                  quote: "Jim has amazing attention to detail! It was great having him lead the effort for our new app build. Jim fit well into our ongoing staff and hit the ground running! From start to finish, it was an absolute pleasure to work with Jim!",
                  name: "Jonathan Swindell",
                  role: "CEO, HBCU HUB"
                },
                {
                  quote: "Jim has a comprehensive, thoughtful, and insightful understanding of design, especially how elements fit within the larger context of a project. He communicates his thoughts clearly and concisely. One of Jim's special qualities that I observed is how he improves the communication within a team and thus the work it produces.",
                  name: "James Creasy",
                  role: "CTO & Technical Founder, Whiznook"
                },
                {
                  quote: "From the time I have known Jim, he has always contributed to the team in more ways than imaginable, from project deliverables to genuine support and encouragement. Skilled in UX Writing plus Interface, Visual, and Narrative Design, his creativity and insight are key during the Discovery and Ideation phases in the design process. Jim is certainly the professional you want on your team!",
                  name: "Jeffery Wiafe",
                  role: "Lead UX Designer/Researcher"
                },
                {
                  quote: "James is a supportive, trusted, and highly skilled UX Designer with an eye for detail and an arsenal of multi-functional talents. His creativity and ability to think outside the box are a delight to witness, and his kindness and empathy make him a joy to work with. He would be an asset to any team.",
                  name: "Kassandra Knapp",
                  role: "UX Designer, Prokeep"
                }
              ].map((t, i) => (
                <blockquote key={i} className="border border-gray-700/50 bg-white/5 backdrop-blur-sm rounded-lg p-6 flex flex-col gap-4">
                  <p className="text-gray-300 text-sm leading-relaxed italic">&ldquo;{t.quote}&rdquo;</p>
                  <footer>
                    <span className="text-white text-sm font-medium">{t.name}</span>
                    <span className="text-gray-500 text-xs block tracking-wide">{t.role}</span>
                  </footer>
                </blockquote>
              ))}
            </div>
          </section>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortfolioWebsite />);
  </script>

  <script>
    window.getEmail = function () {
      return [106, 106, 102, 111, 108, 108, 105, 97, 114, 100, 64, 103, 109, 97, 105, 108, 46, 99, 111, 109]
        .map(c => String.fromCharCode(c)).join('');
    };
    window.openEmail = function () { window.location.href = 'mailto:' + window.getEmail(); };

    document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
    document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
  </script>
