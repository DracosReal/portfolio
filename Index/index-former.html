<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jim's Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out;
    }
    
    .card-container {
      perspective: 1000px;
    }
    
    .card-flipper {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    
    .card-container.flipped .card-flipper {
      transform: rotateY(180deg);
    }
    
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 0.5rem;
    }
    
    .card-back {
      transform: rotateY(180deg);
    }

    details summary {
      list-style: none;
    }
    details summary::-webkit-details-marker {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Icons
    const Home = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
    );

    const ArrowLeft = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    );

    // Stained Glass SVG Components
    const UXGlass = () => (
      <svg viewBox="0 0 300 400" className="w-full h-full">
        <defs>
          <linearGradient id="ux-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style={{stopColor: '#60a5fa', stopOpacity: 0.8}} />
            <stop offset="100%" style={{stopColor: '#3b82f6', stopOpacity: 0.9}} />
          </linearGradient>
          <linearGradient id="ux-grad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style={{stopColor: '#93c5fd', stopOpacity: 0.7}} />
            <stop offset="100%" style={{stopColor: '#67e8f9', stopOpacity: 0.8}} />
          </linearGradient>
        </defs>
        <rect x="20" y="20" width="80" height="120" fill="url(#ux-grad1)" stroke="#1e3a8a" strokeWidth="3"/>
        <rect x="110" y="20" width="80" height="80" fill="url(#ux-grad2)" stroke="#1e3a8a" strokeWidth="3"/>
        <rect x="200" y="20" width="80" height="120" fill="url(#ux-grad1)" stroke="#1e3a8a" strokeWidth="3"/>
        <rect x="20" y="150" width="120" height="100" fill="url(#ux-grad2)" stroke="#1e3a8a" strokeWidth="3"/>
        <rect x="150" y="150" width="130" height="100" fill="url(#ux-grad1)" stroke="#1e3a8a" strokeWidth="3"/>
        <rect x="110" y="110" width="80" height="30" fill="url(#ux-grad2)" stroke="#1e3a8a" strokeWidth="3"/>
        <circle cx="150" cy="310" r="60" fill="url(#ux-grad1)" stroke="#1e3a8a" strokeWidth="3"/>
        <rect x="20" y="260" width="100" height="120" fill="url(#ux-grad2)" stroke="#1e3a8a" strokeWidth="3"/>
        <rect x="200" y="260" width="80" height="120" fill="url(#ux-grad1)" stroke="#1e3a8a" strokeWidth="3"/>
      </svg>
    );

    const NarrativeGlass = () => (
      <svg viewBox="0 0 300 400" className="w-full h-full">
        <defs>
          <linearGradient id="narr-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style={{stopColor: '#c084fc', stopOpacity: 0.8}} />
            <stop offset="100%" style={{stopColor: '#a855f7', stopOpacity: 0.9}} />
          </linearGradient>
          <linearGradient id="narr-grad2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style={{stopColor: '#f0abfc', stopOpacity: 0.7}} />
            <stop offset="100%" style={{stopColor: '#f9a8d4', stopOpacity: 0.8}} />
          </linearGradient>
        </defs>
        <path d="M 20 50 Q 80 20, 150 50 T 280 50" fill="url(#narr-grad1)" stroke="#581c87" strokeWidth="3"/>
        <path d="M 20 120 Q 100 80, 150 120 T 280 120" fill="url(#narr-grad2)" stroke="#581c87" strokeWidth="3"/>
        <ellipse cx="70" cy="200" rx="50" ry="80" fill="url(#narr-grad1)" stroke="#581c87" strokeWidth="3"/>
        <ellipse cx="230" cy="200" rx="50" ry="80" fill="url(#narr-grad2)" stroke="#581c87" strokeWidth="3"/>
        <path d="M 20 280 Q 80 240, 150 280 T 280 280" fill="url(#narr-grad1)" stroke="#581c87" strokeWidth="3"/>
        <circle cx="150" cy="330" r="50" fill="url(#narr-grad2)" stroke="#581c87" strokeWidth="3"/>
        <path d="M 20 160 L 280 160" stroke="#581c87" strokeWidth="3" fill="none"/>
        <path d="M 150 20 L 150 380" stroke="#581c87" strokeWidth="3" fill="none"/>
      </svg>
    );

    const UIGlass = () => (
      <svg viewBox="0 0 300 400" className="w-full h-full">
        <defs>
          <linearGradient id="ui-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style={{stopColor: '#34d399', stopOpacity: 0.8}} />
            <stop offset="100%" style={{stopColor: '#10b981', stopOpacity: 0.9}} />
          </linearGradient>
          <linearGradient id="ui-grad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style={{stopColor: '#5eead4', stopOpacity: 0.7}} />
            <stop offset="100%" style={{stopColor: '#2dd4bf', stopOpacity: 0.8}} />
          </linearGradient>
        </defs>
        <polygon points="150,20 220,90 150,160 80,90" fill="url(#ui-grad1)" stroke="#064e3b" strokeWidth="3"/>
        <polygon points="20,140 90,70 90,210" fill="url(#ui-grad2)" stroke="#064e3b" strokeWidth="3"/>
        <polygon points="280,140 210,70 210,210" fill="url(#ui-grad2)" stroke="#064e3b" strokeWidth="3"/>
        <polygon points="150,180 220,250 150,320 80,250" fill="url(#ui-grad1)" stroke="#064e3b" strokeWidth="3"/>
        <rect x="90" y="230" width="120" height="60" fill="url(#ui-grad2)" stroke="#064e3b" strokeWidth="3"/>
        <circle cx="60" cy="350" r="40" fill="url(#ui-grad1)" stroke="#064e3b" strokeWidth="3"/>
        <circle cx="240" cy="350" r="40" fill="url(#ui-grad1)" stroke="#064e3b" strokeWidth="3"/>
        <polygon points="150,300 180,340 120,340" fill="url(#ui-grad2)" stroke="#064e3b" strokeWidth="3"/>
      </svg>
    );

    const TechnicalGlass = () => (
      <svg viewBox="0 0 300 400" className="w-full h-full">
        <defs>
          <linearGradient id="tech-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style={{stopColor: '#fbbf24', stopOpacity: 0.8}} />
            <stop offset="100%" style={{stopColor: '#f59e0b', stopOpacity: 0.9}} />
          </linearGradient>
          <linearGradient id="tech-grad2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style={{stopColor: '#fcd34d', stopOpacity: 0.7}} />
            <stop offset="100%" style={{stopColor: '#fb923c', stopOpacity: 0.8}} />
          </linearGradient>
        </defs>
        <rect x="20" y="20" width="260" height="60" fill="url(#tech-grad1)" stroke="#78350f" strokeWidth="3"/>
        <rect x="20" y="90" width="120" height="100" fill="url(#tech-grad2)" stroke="#78350f" strokeWidth="3"/>
        <rect x="160" y="90" width="120" height="100" fill="url(#tech-grad1)" stroke="#78350f" strokeWidth="3"/>
        <rect x="20" y="200" width="80" height="80" fill="url(#tech-grad1)" stroke="#78350f" strokeWidth="3"/>
        <rect x="110" y="200" width="80" height="80" fill="url(#tech-grad2)" stroke="#78350f" strokeWidth="3"/>
        <rect x="200" y="200" width="80" height="80" fill="url(#tech-grad1)" stroke="#78350f" strokeWidth="3"/>
        <rect x="20" y="290" width="260" height="90" fill="url(#tech-grad2)" stroke="#78350f" strokeWidth="3"/>
        <line x1="150" y1="20" x2="150" y2="80" stroke="#78350f" strokeWidth="2"/>
        <line x1="20" y1="240" x2="280" y2="240" stroke="#78350f" strokeWidth="2"/>
      </svg>
    );

    const GameGlass = () => (
      <svg viewBox="0 0 300 400" className="w-full h-full">
        <defs>
          <linearGradient id="game-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style={{stopColor: '#f87171', stopOpacity: 0.8}} />
            <stop offset="100%" style={{stopColor: '#ef4444', stopOpacity: 0.9}} />
          </linearGradient>
          <linearGradient id="game-grad2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style={{stopColor: '#fda4af', stopOpacity: 0.7}} />
            <stop offset="100%" style={{stopColor: '#fb7185', stopOpacity: 0.8}} />
          </linearGradient>
        </defs>
        <rect x="30" y="30" width="240" height="80" rx="10" fill="url(#game-grad1)" stroke="#7f1d1d" strokeWidth="3"/>
        <polygon points="150,130 200,180 150,230 100,180" fill="url(#game-grad2)" stroke="#7f1d1d" strokeWidth="3"/>
        <circle cx="60" cy="180" r="35" fill="url(#game-grad1)" stroke="#7f1d1d" strokeWidth="3"/>
        <circle cx="240" cy="180" r="35" fill="url(#game-grad1)" stroke="#7f1d1d" strokeWidth="3"/>
        <rect x="80" y="250" width="140" height="60" rx="30" fill="url(#game-grad2)" stroke="#7f1d1d" strokeWidth="3"/>
        <polygon points="150,320 180,350 150,380 120,350" fill="url(#game-grad1)" stroke="#7f1d1d" strokeWidth="3"/>
        <circle cx="50" cy="320" r="25" fill="url(#game-grad2)" stroke="#7f1d1d" strokeWidth="3"/>
        <circle cx="250" cy="320" r="25" fill="url(#game-grad2)" stroke="#7f1d1d" strokeWidth="3"/>
      </svg>
    );

    const PortfolioWebsite = () => {
      const [stage, setStage] = useState('intro');
      const [typedText, setTypedText] = useState('');
      const [showCursor, setShowCursor] = useState(true);
      const [flippedCards, setFlippedCards] = useState([]);
      const [selectedCard, setSelectedCard] = useState(null);
      const [currentDiscipline, setCurrentDiscipline] = useState(null);
      const [currentProject, setCurrentProject] = useState(null);

      // ===== CUSTOMIZE THIS SECTION =====
      const yourName = "Jim";
      const welcomeMessage = `I'm ${yourName}. Welcome to my world.`;

      const disciplines = [
        {
          id: 'ux',
          title: 'UX',
          subtitle: 'The Architect',
          color: 'from-blue-400 to-cyan-300',
          glassColor: 'bg-blue-500/20',
          borderColor: 'border-blue-400/50',
          artComponent: UXGlass,
          projects: [
            {
              id: 'mental-health',
              title: 'Improving Access to Mental Health Care',
              summary: 'A co-designed UX study exploring telehealth interventions to reduce barriers for individuals seeking mental health support.',
              role: 'UX Design, UX Research, UI Design',
              team: '3 UX Designers',
              timeline: '8 weeks',
              problem: 'Many individuals who want or need mental healthcare encounter obstacles such as stigma, financial hardship, insurance opacity, and limited provider availability. These barriers often compound anxiety and negatively affect overall wellbeing.',
              approach: 'Through user interviews and stakeholder collaboration, we explored interventions that could mitigate access barriers. Our findings pointed toward a telehealth platform emphasizing equality, real-time availability, and transparent insurance coverage.',
              research: {
                title: 'User Research',
                content: 'We interviewed 8 participants: 5 individuals seeking care and 3 mental healthcare professionals. Interviews focused on values, motivations, and perceived barriers to access.'
              },
              findings: [
                'Stigma and mental health literacy impact help-seeking behavior',
                'Cost and insurance opacity deter access',
                'Demand exceeds provider availability',
                'Marginalized groups face disproportionate barriers'
              ],
              design: {
                title: 'Design & Iteration',
                content: 'Wireframes and mid-fidelity prototypes were tested with users, leading to reduced screen complexity and the addition of FAQ support.',
                // ADD YOUR IMAGES HERE - Replace URLs with your actual image URLs
                images: [
                  'https://via.placeholder.com/800x600/3b82f6/ffffff?text=Wireframe+1',
                  'https://via.placeholder.com/800x600/60a5fa/ffffff?text=Prototype+Screen',
                  'https://via.placeholder.com/800x600/93c5fd/000000?text=Final+Design'
                ]
              },
              // OPTIONAL: Add video walkthrough URL (YouTube, Vimeo, etc)
              videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
              // OPTIONAL: Add link to full deck/presentation
              deckUrl: 'https://example.com/full-presentation.pdf'
            },
            {
              id: 'healthcare-portal',
              title: 'Healthcare Portal UX Research',
              summary: 'Improving patient experience through comprehensive research and redesign.',
              role: 'Lead UX Researcher',
              team: '2 Researchers, 1 Designer',
              timeline: '6 weeks',
              problem: 'Patients struggled to navigate the existing portal, leading to missed appointments and medication errors.',
              approach: 'Conducted usability testing and heuristic evaluation to identify pain points and design solutions.'
            },
            {
              id: 'ecommerce',
              title: 'E-commerce Checkout Optimization',
              summary: 'Reducing cart abandonment through streamlined checkout flow.',
              role: 'UX Designer',
              team: 'Solo project',
              timeline: '4 weeks',
              problem: 'High cart abandonment rate (68%) during checkout process.',
              approach: 'A/B testing and user session analysis revealed friction points in the payment flow.'
            },
            {
              id: 'accessibility',
              title: 'Accessibility Audit & Remediation',
              summary: 'WCAG 2.1 AA compliance for enterprise application.',
              role: 'Accessibility Lead',
              team: '1 Designer, 2 Developers',
              timeline: '12 weeks',
              problem: 'Application failed basic accessibility standards, excluding users with disabilities.',
              approach: 'Systematic audit and remediation following WCAG guidelines.'
            }
          ]
        },
        {
          id: 'narrative',
          title: 'Narrative',
          subtitle: 'The Storyteller',
          color: 'from-purple-400 to-pink-300',
          glassColor: 'bg-purple-500/20',
          borderColor: 'border-purple-400/50',
          artComponent: NarrativeGlass,
          projects: [
            {
              id: 'interactive-fiction',
              title: 'Interactive Fiction: The Last Signal',
              summary: 'A branching narrative experience set in deep space.',
              role: 'Writer, Narrative Designer',
              team: 'Solo project',
              timeline: '16 weeks'
            }
          ]
        },
        {
          id: 'ui',
          title: 'UI',
          subtitle: 'The Craftsperson',
          color: 'from-emerald-400 to-teal-300',
          glassColor: 'bg-emerald-500/20',
          borderColor: 'border-emerald-400/50',
          artComponent: UIGlass,
          projects: [
            {
              id: 'design-system',
              title: 'Design System: Component Library',
              summary: 'Scalable design system for enterprise product suite.',
              role: 'UI Designer, Design Systems Lead',
              team: '3 Designers',
              timeline: '24 weeks'
            }
          ]
        },
        {
          id: 'technical',
          title: 'Technical Writing',
          subtitle: 'The Translator',
          color: 'from-amber-400 to-orange-300',
          glassColor: 'bg-amber-500/20',
          borderColor: 'border-amber-400/50',
          artComponent: TechnicalGlass,
          projects: [
            {
              id: 'api-docs',
              title: 'API Documentation Portal',
              summary: 'Developer-focused documentation for REST API.',
              role: 'Technical Writer',
              team: '1 Writer, 2 Engineers',
              timeline: '10 weeks'
            }
          ]
        },
        {
          id: 'game',
          title: 'Game Design',
          subtitle: 'The Worldbuilder',
          color: 'from-red-400 to-rose-300',
          glassColor: 'bg-red-500/20',
          borderColor: 'border-red-400/50',
          artComponent: GameGlass,
          projects: [
            {
              id: 'puzzle-mobile',
              title: 'Puzzle Mechanics for Mobile Game',
              summary: 'Core gameplay loop design for casual mobile puzzle game.',
              role: 'Game Designer',
              team: '2 Designers, 3 Developers',
              timeline: '20 weeks'
            }
          ]
        }
      ];
      // ===== END CUSTOMIZATION SECTION =====

      useEffect(() => {
        const interval = setInterval(() => {
          setShowCursor(prev => !prev);
        }, 530);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (stage === 'typing') {
          let index = 0;
          const typingInterval = setInterval(() => {
            if (index <= welcomeMessage.length) {
              setTypedText(welcomeMessage.substring(0, index));
              index++;
            } else {
              clearInterval(typingInterval);
              setTimeout(() => setStage('cards'), 1500);
            }
          }, 80);
          return () => clearInterval(typingInterval);
        }
      }, [stage, welcomeMessage]);

      const handleIntroClick = () => {
        if (stage === 'intro') {
          setStage('typing');
        }
      };

      const handleCardClick = (disciplineId) => {
        if (flippedCards.includes(disciplineId)) {
          setFlippedCards(flippedCards.filter(id => id !== disciplineId));
          setSelectedCard(null);
        } else {
          setFlippedCards([...flippedCards, disciplineId]);
          setSelectedCard(null);
        }
      };

      const handleConfirm = () => {
        if (selectedCard) {
          const discipline = disciplines.find(d => d.id === selectedCard);
          setCurrentDiscipline(discipline);
          setStage('discipline');
        }
      };

      const handleProjectClick = (project) => {
        setCurrentProject(project);
        setStage('project');
      };

      const goHome = () => {
        setStage('cards');
        setCurrentDiscipline(null);
        setCurrentProject(null);
        setFlippedCards([]);
        setSelectedCard(null);
      };

      const goBackToDiscipline = () => {
        setStage('discipline');
        setCurrentProject(null);
      };

      const goBackToCards = () => {
        setStage('cards');
        setCurrentDiscipline(null);
        setCurrentProject(null);
      };

      if (stage === 'intro') {
        return (
          <div 
            onClick={handleIntroClick}
            className="min-h-screen bg-black flex items-center justify-center cursor-pointer"
          >
            <div className="text-center">
              <h1 className="text-7xl font-light bg-gradient-to-r from-blue-300 to-cyan-400 bg-clip-text text-transparent">
                Hi.
                <span className={`${showCursor ? 'opacity-100' : 'opacity-0'} transition-opacity`}>|</span>
              </h1>
            </div>
          </div>
        );
      }

      if (stage === 'typing') {
        return (
          <div className="min-h-screen bg-black flex items-center justify-center">
            <div className="text-center">
              <h1 className="text-6xl font-light bg-gradient-to-r from-blue-300 to-cyan-400 bg-clip-text text-transparent">
                {typedText}
                <span className={`${showCursor ? 'opacity-100' : 'opacity-0'} transition-opacity`}>|</span>
              </h1>
            </div>
          </div>
        );
      }

      // CASE STUDY VIEW
      if (stage === 'project' && currentProject) {
        return (
          <div className="min-h-screen bg-black text-white">
            <div className="max-w-4xl mx-auto px-8 py-12">
              {/* Navigation */}
              <div className="flex items-center gap-4 mb-12">
                <button onClick={goBackToDiscipline} className="p-2 hover:bg-white/10 rounded-lg transition-colors">
                  <ArrowLeft className="w-6 h-6" />
                </button>
                <button onClick={goHome} className="p-2 hover:bg-white/10 rounded-lg transition-colors">
                  <Home className="w-6 h-6" />
                </button>
              </div>

              {/* Case Study Header */}
              <h2 className="text-4xl font-light mb-4 bg-gradient-to-r from-blue-300 to-cyan-400 bg-clip-text text-transparent">
                {currentProject.title}
              </h2>
              <p className="text-neutral-400 mb-6 text-lg">
                {currentProject.summary}
              </p>

              {/* Meta Info */}
              <div className="text-sm text-neutral-500 mb-12 pb-8 border-b border-neutral-800">
                Role: {currentProject.role} · Team: {currentProject.team} · Timeline: {currentProject.timeline}
              </div>

              {/* The Problem */}
              {currentProject.problem && (
                <div className="mb-12">
                  <h3 className="text-2xl font-light mb-4 text-blue-300">The Problem</h3>
                  <p className="text-neutral-300 leading-relaxed">
                    {currentProject.problem}
                  </p>
                </div>
              )}

              {/* The Approach */}
              {currentProject.approach && (
                <div className="mb-12">
                  <h3 className="text-2xl font-light mb-4 text-blue-300">The Approach</h3>
                  <p className="text-neutral-300 leading-relaxed">
                    {currentProject.approach}
                  </p>
                </div>
              )}

              {/* Expandable Details */}
              {(currentProject.research || currentProject.findings || currentProject.design) && (
                <details className="mt-12 border border-neutral-800 rounded-lg p-6 hover:border-neutral-700 transition-colors">
                  <summary className="cursor-pointer text-neutral-400 hover:text-neutral-200 text-lg font-light">
                    View research & design process ↓
                  </summary>
                  <div className="mt-8 space-y-8">
                    {/* User Research */}
                    {currentProject.research && (
                      <div>
                        <h4 className="font-medium mb-3 text-blue-300">{currentProject.research.title}</h4>
                        <p className="text-neutral-400 leading-relaxed">
                          {currentProject.research.content}
                        </p>
                      </div>
                    )}

                    {/* Key Findings */}
                    {currentProject.findings && (
                      <div>
                        <h4 className="font-medium mb-3 text-blue-300">Key Findings</h4>
                        <ul className="space-y-2">
                          {currentProject.findings.map((finding, idx) => (
                            <li key={idx} className="text-neutral-400 leading-relaxed flex items-start">
                              <span className="text-blue-400 mr-2">•</span>
                              {finding}
                            </li>
                          ))}
                        </ul>
                      </div>
                    )}

                    {/* Design & Iteration with Images */}
                    {currentProject.design && (
                      <div>
                        <h4 className="font-medium mb-3 text-blue-300">{currentProject.design.title}</h4>
                        <p className="text-neutral-400 leading-relaxed mb-6">
                          {currentProject.design.content}
                        </p>
                        
                        {/* Image Gallery */}
                        {currentProject.design.images && (
                          <div className="grid gap-6 mt-6">
                            {currentProject.design.images.map((img, idx) => (
                              <img 
                                key={idx}
                                src={img} 
                                alt={`Design screenshot ${idx + 1}`}
                                className="w-full rounded-lg border border-neutral-800 hover:border-neutral-600 transition-colors"
                              />
                            ))}
                          </div>
                        )}
                      </div>
                    )}

                    {/* Video Walkthrough */}
                    {currentProject.videoUrl && (
                      <div>
                        <h4 className="font-medium mb-3 text-blue-300">Prototype Walkthrough</h4>
                        <div className="aspect-video rounded-lg overflow-hidden border border-neutral-800">
                          <iframe 
                            width="100%" 
                            height="100%" 
                            src={currentProject.videoUrl}
                            title="Prototype walkthrough"
                            frameBorder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowFullScreen
                          ></iframe>
                        </div>
                      </div>
                    )}

                    {/* Full Deck Link */}
                    {currentProject.deckUrl && (
                      <div>
                        <a 
                          href={currentProject.deckUrl}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="inline-block px-6 py-3 bg-gradient-to-r from-blue-500 to-cyan-400 text-black font-medium rounded-lg hover:opacity-90 transition-opacity"
                        >
                          View Full Presentation →
                        </a>
                      </div>
                    )}
                  </div>
                </details>
              )}
            </div>
          </div>
        );
      }

      // DISCIPLINE PAGE (Project List)
      if (stage === 'discipline' && currentDiscipline) {
        return (
          <div className="min-h-screen bg-black text-white p-8">
            <div className="max-w-6xl mx-auto">
              <div className="flex items-center gap-4 mb-12">
                <button onClick={goBackToCards} className="p-2 hover:bg-white/10 rounded-lg transition-colors">
                  <ArrowLeft className="w-6 h-6" />
                </button>
                <button onClick={goHome} className="p-2 hover:bg-white/10 rounded-lg transition-colors">
                  <Home className="w-6 h-6" />
                </button>
              </div>

              <div className="mb-8">
                <h2 className={`text-5xl font-light mb-2 bg-gradient-to-r ${currentDiscipline.color} bg-clip-text text-transparent`}>
                  {currentDiscipline.title}
                </h2>
                <p className="text-2xl text-gray-400">{currentDiscipline.subtitle}</p>
              </div>

              <div className="grid gap-8">
                {currentDiscipline.projects.map((project, idx) => (
                  <div 
                    key={idx}
                    onClick={() => handleProjectClick(project)}
                    className="border border-white/10 rounded-lg p-8 hover:border-white/30 transition-all hover:scale-[1.02] cursor-pointer backdrop-blur-sm bg-white/5"
                  >
                    <h3 className="text-2xl font-light mb-2">{project.title}</h3>
                    <p className="text-gray-400 mb-4">{project.summary}</p>
                    <div className="text-sm text-gray-500">
                      {project.role} · {project.timeline}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // CARD SELECTION STAGE
      return (
        <div className="min-h-screen bg-black text-white p-8">
          <button onClick={goHome} className="fixed top-8 right-8 p-2 hover:bg-white/10 rounded-lg transition-colors z-50">
            <Home className="w-6 h-6" />
          </button>

          <div className="max-w-7xl mx-auto">
            <h2 className="text-5xl font-light text-center mb-16 bg-gradient-to-r from-blue-300 to-cyan-400 bg-clip-text text-transparent">
              Choose your path
            </h2>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              {disciplines.map((discipline) => {
                const ArtComponent = discipline.artComponent;
                const isFlipped = flippedCards.includes(discipline.id);
                
                return (
                  <div 
                    key={discipline.id} 
                    className={`card-container h-96 ${isFlipped ? 'flipped' : ''}`}
                    onClick={() => handleCardClick(discipline.id)}
                  >
                    <div className="card-flipper cursor-pointer">
                      <div className={`card-front border-2 ${discipline.borderColor} ${discipline.glassColor} backdrop-blur-md overflow-hidden`}>
                        <div className="absolute inset-0 p-4">
                          <ArtComponent />
                        </div>
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex flex-col justify-end p-6">
                          <h3 className={`text-4xl font-light mb-1 bg-gradient-to-br ${discipline.color} bg-clip-text text-transparent`}>
                            {discipline.title}
                          </h3>
                          <p className="text-gray-300 text-sm tracking-wider">{discipline.subtitle}</p>
                        </div>
                      </div>

                      <div className={`card-back border-2 ${discipline.borderColor} bg-black/90 backdrop-blur-md p-6 flex flex-col`}>
                        <h3 className={`text-3xl font-light mb-4 bg-gradient-to-br ${discipline.color} bg-clip-text text-transparent`}>
                          {discipline.title}
                        </h3>
                        <div className="flex-1 space-y-3 mb-4">
                          {discipline.projects.slice(0, 4).map((project, idx) => (
                            <div 
                              key={idx}
                              className="text-sm text-gray-300 bg-white/5 border border-white/10 rounded p-3 hover:bg-white/10 transition-colors"
                            >
                              {project.title}
                            </div>
                          ))}
                        </div>
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            setSelectedCard(discipline.id);
                          }}
                          className={`w-full py-3 rounded bg-gradient-to-r ${discipline.color} text-black font-medium hover:opacity-90 transition-opacity`}
                        >
                          Select this path
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {selectedCard && (
              <div className="fixed bottom-8 left-1/2 transform -translate-x-1/2 animate-fadeIn">
                <button
                  onClick={handleConfirm}
                  className="px-8 py-4 bg-gradient-to-r from-blue-500 to-cyan-400 text-black text-xl font-medium rounded-lg hover:opacity-90 transition-opacity shadow-2xl"
                >
                  Explore {disciplines.find(d => d.id === selectedCard)?.title}
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortfolioWebsite />);
  </script>
</body>
</html>
